<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Icon Mech · Charlotte · IMI 2026</title>
<style>
  :root {
    --bg: #f2ebd8;
    --fg: #1b2a4e;
    --muted: #666;
    --accent: #1b2a4e;
    --card: #fff;
    --border: #ddd;
    --good: #1c7c3a;
    --bad: #a82020;
    --navy: #1b2a4e;
    --carolina: #7bb6e6;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; color: var(--fg);
               font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
               -webkit-font-smoothing: antialiased; }
  body { background:
           url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='10'><path d='M3 0 L6 5 L3 10' stroke='%231b2a4e' stroke-width='2' fill='none' stroke-linecap='square' stroke-linejoin='miter'/></svg>"),
           var(--bg);
         background-attachment: fixed; }
  header { background: var(--navy); color: #fff; padding: 14px 20px;
           display: flex; align-items: center; gap: 12px; }
  header h1 { margin: 0; font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
  header .subtitle { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  header .header-right { margin-left: auto; text-align: right; font-size: 11px;
                         opacity: 0.85; line-height: 1.3; }
  header .last-updated-label { text-transform: uppercase; letter-spacing: 0.05em;
                                font-size: 9px; opacity: 0.7; }
  .imi-dots { display: flex; gap: 5px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  nav.tabs { display: flex; background: #fff; border-bottom: 1px solid var(--border);
             overflow-x: auto; position: sticky; top: 0; z-index: 10; }
  nav.tabs button { background: transparent; border: 0; padding: 14px 18px;
                    font-size: 14px; font-weight: 600; color: var(--muted);
                    cursor: pointer; border-bottom: 3px solid transparent; }
  nav.tabs button.active { color: var(--navy); border-bottom-color: var(--carolina); }
  main { max-width: 720px; margin: 0 auto; padding: 16px; }
  .panel { display: none; }
  .panel.active { display: block; }
  .panel > h2,
  .panel > h3,
  .panel > p.label,
  .panel > div.label,
  .panel > div:has(> h2) { background: var(--card); border: 1px solid var(--border);
                           border-radius: 8px; padding: 10px 14px;
                           margin: 0 0 12px 0; }
  .panel > h2 { font-size: 18px; }
  .card { background: var(--card); border: 1px solid var(--border);
          border-radius: 8px; padding: 14px; margin-bottom: 12px; }
  .card h3 { margin: 0 0 6px 0; font-size: 14px; color: var(--muted);
             text-transform: uppercase; letter-spacing: 0.5px; }
  .card .big { font-size: 32px; font-weight: 700; }
  .label { font-size: 12px; color: var(--muted); text-transform: uppercase;
           letter-spacing: 0.5px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px;
           font-size: 12px; font-weight: 700; }
  .badge.win { background: #e6f3ea; color: var(--good); }
  .badge.loss { background: #fbe6e6; color: var(--bad); }
  .row { display: flex; justify-content: space-between; align-items: center;
         padding: 10px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: 0; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
          gap: 10px; }
  .roster-card { background: #fff; border: 1px solid var(--border);
                 border-radius: 8px; padding: 10px; text-align: center; }
  .roster-card .jersey { font-size: 28px; font-weight: 800; }
  .roster-card .nick { font-weight: 700; margin-top: 4px; }
  .roster-card .real { font-size: 12px; color: var(--muted); }
  button.primary { background: var(--navy); color: #fff; border: 0;
                   padding: 10px 16px; border-radius: 6px; font-weight: 600;
                   cursor: pointer; }
  button.secondary { background: #fff; color: var(--navy); border: 1px solid var(--navy);
                     padding: 10px 16px; border-radius: 6px; font-weight: 600;
                     cursor: pointer; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; background: #fff;
          border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  th, td { text-align: right; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  th:first-child, td:first-child { text-align: left; }
  th { background: #f0f0ed; cursor: pointer; user-select: none; }
  /* Modal */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
              z-index: 100; align-items: center; justify-content: center; padding: 16px; }
  .modal-bg.active { display: flex; }
  .modal { background: #fff; border-radius: 12px; padding: 20px; max-width: 500px;
           width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal h2 { margin: 0 0 4px 0; font-size: 18px; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
           background: var(--navy); color: #fff; padding: 10px 16px; border-radius: 6px;
           opacity: 0; transition: opacity 0.2s; z-index: 200; pointer-events: none; }
  .toast.show { opacity: 1; }
  /* Diamond */
  svg.diamond { width: 100%; height: auto; max-height: 480px; }
</style>
</head>
<body>

<header>
  <div class="imi-dots">
    <span class="dot" style="background:#cc2027"></span>
    <span class="dot" style="background:#1a6fc4"></span>
    <span class="dot" style="background:#5aaa35"></span>
    <span class="dot" style="background:#e87722"></span>
  </div>
  <div>
    <h1>Icon Mech · Charlotte</h1>
    <div class="subtitle">Softball 2026 Season</div>
  </div>
  <div class="header-right">
    <div class="last-updated-label">Updated</div>
    <div id="last-updated">—</div>
  </div>
</header>

<nav class="tabs" id="tabs">
  <button data-tab="home" class="active">Home</button>
  <button data-tab="schedule">Schedule</button>
  <button data-tab="lineup">Lineup</button>
  <button data-tab="roster">Roster</button>
  <button data-tab="stats">Stats</button>
</nav>

<main>
  <section id="home" class="panel active"></section>
  <section id="schedule" class="panel"></section>
  <section id="lineup" class="panel"></section>
  <section id="roster" class="panel"></section>
  <section id="stats" class="panel"></section>
</main>

<div class="modal-bg" id="rsvp-modal">
  <div class="modal" id="rsvp-modal-content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// Global state
let DATA = null;
let KEYS = null;
let RSVPS = {};  // { "YYYY-MM-DD": { nick: { status, ts } } }

// --- Tab switching ---
document.getElementById("tabs").addEventListener("click", (e) => {
  if (e.target.tagName !== "BUTTON") return;
  const tab = e.target.dataset.tab;
  document.querySelectorAll("nav.tabs button").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  document.querySelectorAll(".panel").forEach(p => p.classList.toggle("active", p.id === tab));
});

// --- Toast helper ---
// Format a "HH:MM" 24-hour string as 12-hour with AM/PM. Empty string passes through.
function fmtTime(t) {
  if (!t) return "";
  const [h, m] = t.split(":").map(Number);
  if (isNaN(h) || isNaN(m)) return t;
  const period = h >= 12 ? "PM" : "AM";
  const h12 = h % 12 || 12;
  return `${h12}:${String(m).padStart(2, "0")} ${period}`;
}

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2200);
}

// --- Bootstrap ---
async function load() {
  DATA = await fetch("data.json").then(r => r.json());
  KEYS = await fetch("keys.json").then(r => r.json());
  await loadRsvps();
  const lu = DATA.season && DATA.season.lastUpdated;
  if (lu) document.getElementById("last-updated").textContent = lu;
  renderHome();
  renderSchedule();
  renderLineup();
  renderRoster();
  renderStats();
}

async function loadRsvps() {
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${KEYS.binId}/latest`, {
      headers: { "X-Access-Key": KEYS.readKey }
    });
    if (!res.ok) throw new Error("Bin read failed: " + res.status);
    const json = await res.json();
    RSVPS = json.record || {};
  } catch (e) {
    console.error("Could not load RSVPs:", e);
    RSVPS = {};
  }
}

// --- Render stubs (each tab task fills these in) ---
function renderHome() {
  const home = document.getElementById("home");
  const { season, schedule, stats_summary } = DATA;
  const played = schedule.filter(g => g.status === "played");
  const upcoming = schedule.filter(g => g.status === "upcoming")
                            .sort((a, b) => a.date.localeCompare(b.date));
  const lastGame = played[played.length - 1];
  const nextGame = upcoming[0];
  const recordStr = `${season.record.W}–${season.record.L}`;

  // Top stat leaders
  const players = Object.entries(stats_summary || {});
  const sortedByAVG = [...players].filter(([, s]) => s.AB >= 1)
                                   .sort((a, b) => b[1].AVG - a[1].AVG).slice(0, 3);
  const sortedByOPS = [...players].filter(([, s]) => s.AB >= 1)
                                   .sort((a, b) => b[1].OPS - a[1].OPS).slice(0, 3);

  let html = "";
  html += `<div class="card"><h3>Season Record</h3><div class="big">${recordStr}</div></div>`;

  if (nextGame) {
    const rsvps = RSVPS[nextGame.date] || {};
    const inCount = Object.values(rsvps).filter(r => r.status === "IN").length;
    const outCount = Object.values(rsvps).filter(r => r.status === "OUT").length;
    const mainKeys = new Set(DATA.roster.filter(p => p.type === "main").map(p => p.nickname || p.name));
    const respondedMains = Object.keys(rsvps).filter(k => mainKeys.has(k)).length;
    const unconfirmed = mainKeys.size - respondedMains;
    html += `<div class="card">
      <h3>Next Game</h3>
      <div><strong>${nextGame.date}</strong> · vs. ${nextGame.opponent || "TBD"}</div>
      <div class="label" style="margin-top:6px;">${nextGame.location || ""} · ${fmtTime(nextGame.time)}</div>
      <div style="margin-top:10px;">
        <span class="label">RSVPs:</span>
        ${inCount} IN · ${outCount} OUT · ${unconfirmed} ?
      </div>
    </div>`;
  }

  if (lastGame) {
    const r = lastGame.result || {};
    const badgeCls = r.outcome === "W" ? "win" : "loss";
    html += `<div class="card">
      <h3>Last Game</h3>
      <div><strong>${lastGame.date}</strong> vs. ${lastGame.opponent || "TBD"}</div>
      <div style="margin-top:6px;">${r.score || "?"} <span class="badge ${badgeCls}">${r.outcome || "?"}</span></div>
    </div>`;
  }

  if (sortedByAVG.length) {
    html += `<div class="card"><h3>Top Avg</h3>`;
    sortedByAVG.forEach(([nick, s]) => {
      html += `<div class="row"><span>${nick}</span><span>${s.AVG.toFixed(3)}</span></div>`;
    });
    html += `</div>`;
  }
  if (sortedByOPS.length) {
    html += `<div class="card"><h3>Top OPS</h3>`;
    sortedByOPS.forEach(([nick, s]) => {
      html += `<div class="row"><span>${nick}</span><span>${s.OPS.toFixed(3)}</span></div>`;
    });
    html += `</div>`;
  }

  home.innerHTML = html;
}
function renderSchedule() {
  const el = document.getElementById("schedule");
  const games = [...DATA.schedule].sort((a, b) => a.date.localeCompare(b.date));
  let html = `<h2 style="margin-top:0;">Schedule</h2>`;
  if (games.length === 0) {
    html += `<p class="label">No games scheduled yet.</p>`;
  }
  games.forEach(g => {
    if (g.status === "played") {
      const r = g.result || {};
      const badgeCls = r.outcome === "W" ? "win" : "loss";
      html += `<div class="card">
        <div class="row" style="border:0;padding:0;">
          <div>
            <div class="label">Game ${g.game} · ${g.date}</div>
            <div><strong>vs. ${g.opponent || "TBD"}</strong></div>
          </div>
          <div style="text-align:right;">
            <div>${r.score || "?"}</div>
            <span class="badge ${badgeCls}">${r.outcome || "?"}</span>
          </div>
        </div>
      </div>`;
    } else {
      const rsvps = RSVPS[g.date] || {};
      const inCount = Object.values(rsvps).filter(r => r.status === "IN").length;
      const outCount = Object.values(rsvps).filter(r => r.status === "OUT").length;
      const mainKeys = new Set(DATA.roster.filter(p => p.type === "main").map(p => p.nickname || p.name));
      const respondedMains = Object.keys(rsvps).filter(k => mainKeys.has(k)).length;
      const unconfirmed = mainKeys.size - respondedMains;
      html += `<div class="card">
        <div class="row" style="border:0;padding:0;align-items:flex-start;">
          <div>
            <div class="label">Game ${g.game} · ${g.date}</div>
            <div><strong>vs. ${g.opponent || "TBD"}</strong></div>
            <div class="label" style="margin-top:4px;">${g.location || ""} · ${fmtTime(g.time)}</div>
            <div style="margin-top:8px;font-size:13px;">
              ${inCount} IN · ${outCount} OUT · ${unconfirmed} ?
            </div>
          </div>
          <button class="primary" onclick="openRsvp('${g.date}')">RSVP</button>
        </div>
      </div>`;
    }
  });
  el.innerHTML = html;
}

let currentRsvpDate = null;
let currentRsvpName = null;

function openRsvp(date) {
  currentRsvpDate = date;
  currentRsvpName = null;
  document.getElementById("rsvp-modal").classList.add("active");
  renderRsvpModal();
}

function closeRsvp() {
  document.getElementById("rsvp-modal").classList.remove("active");
}

function renderRsvpModal() {
  const date = currentRsvpDate;
  const game = DATA.schedule.find(s => s.date === date) || {};
  const rsvps = RSVPS[date] || {};
  const myStatus = currentRsvpName ? (rsvps[currentRsvpName]?.status || "unconfirmed") : null;

  const inList = Object.entries(rsvps).filter(([, r]) => r.status === "IN").map(([n]) => n);
  const outList = Object.entries(rsvps).filter(([, r]) => r.status === "OUT").map(([n]) => n);
  const responded = new Set([...inList, ...outList]);
  const unconfirmed = DATA.roster
    .filter(p => p.type === "main")
    .map(p => p.nickname || p.name)
    .filter(n => !responded.has(n));

  let html = `<div style="display:flex;justify-content:space-between;align-items:start;">
    <div>
      <h2>${date} · vs. ${game.opponent || "TBD"}</h2>
      <div class="label">${game.location || ""} · ${fmtTime(game.time)}</div>
    </div>
    <button class="secondary" onclick="closeRsvp()" style="padding:6px 12px;">Close</button>
  </div>
  <div style="margin-top:16px;">
    <label class="label">Who are you?</label>
    <select id="rsvp-name-picker" style="width:100%;padding:8px;font-size:14px;margin-top:4px;">
      <option value="">-- Select your name --</option>
      ${DATA.roster.map(p => {
        const key = p.nickname || p.name;
        const label = p.nickname ? `${p.nickname} (${p.name})` : p.name;
        return `<option value="${key}" ${key === currentRsvpName ? "selected" : ""}>${label}</option>`;
      }).join("")}
    </select>
  </div>`;

  if (currentRsvpName) {
    html += `<div style="margin-top:16px;text-align:center;">
      <div style="margin-bottom:8px;">Hey <strong>${currentRsvpName}</strong> — you're <strong>${myStatus}</strong></div>
      <button class="primary" onclick="submitRsvp('IN')" style="margin-right:8px;padding:14px 24px;">I'M IN</button>
      <button class="primary" onclick="submitRsvp('OUT')" style="background:#a82020;padding:14px 24px;">I'M OUT</button>
    </div>`;
  }

  html += `<div style="margin-top:20px;border-top:1px solid var(--border);padding-top:14px;">
    <div class="label">Team status</div>
    <div style="margin-top:8px;"><strong>IN (${inList.length}):</strong> ${inList.join(", ") || "—"}</div>
    <div style="margin-top:6px;"><strong>OUT (${outList.length}):</strong> ${outList.join(", ") || "—"}</div>
    <div style="margin-top:6px;color:var(--muted);"><strong>? (${unconfirmed.length}):</strong> ${unconfirmed.join(", ") || "—"}</div>
  </div>`;

  document.getElementById("rsvp-modal-content").innerHTML = html;
  const picker = document.getElementById("rsvp-name-picker");
  if (picker) picker.addEventListener("change", (e) => {
    currentRsvpName = e.target.value || null;
    renderRsvpModal();
  });
}

async function submitRsvp(status) {
  if (!currentRsvpName || !currentRsvpDate) return;

  // Optimistic update
  const prev = JSON.parse(JSON.stringify(RSVPS));
  if (!RSVPS[currentRsvpDate]) RSVPS[currentRsvpDate] = {};
  RSVPS[currentRsvpDate][currentRsvpName] = { status, ts: new Date().toISOString() };
  renderRsvpModal();
  renderSchedule();
  renderHome();

  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${KEYS.binId}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Master-Key": KEYS.writeKey,
      },
      body: JSON.stringify(RSVPS),
    });
    if (!res.ok) throw new Error("Bin write failed: " + res.status);
    toast(`Got it — you're ${status}`);
  } catch (e) {
    console.error(e);
    RSVPS = prev;  // revert
    renderRsvpModal();
    renderSchedule();
    renderHome();
    toast("Couldn't save — try again");
  }
}

function renderLineup() {
  const el = document.getElementById("lineup");
  const lineups = [...DATA.lineups].sort((a, b) => b.date.localeCompare(a.date));
  if (lineups.length === 0) {
    el.innerHTML = `<h2>Lineup</h2><p class="label">Lineup posts Wed/Thu. RSVP on the Schedule tab.</p>`;
    return;
  }

  let selected = lineups[0];
  function render(lineup) {
    const sched = DATA.schedule.find(s => s.date === lineup.date) || {};
    const nameByNick = Object.fromEntries(DATA.roster.map(p => [p.nickname, p.name]));
    const jerseyByNick = Object.fromEntries(DATA.roster.map(p => [p.nickname, p.jersey]));

    let html = `<div style="display:flex;justify-content:space-between;align-items:center;">
      <h2 style="margin:0;">Lineup — Game ${lineup.game}</h2>
      <a class="secondary" href="lineups/${lineup.date}-lineup.pdf" target="_blank"
         style="text-decoration:none;display:inline-block;">Print PDF</a>
    </div>
    <div class="label" style="margin:4px 0 16px 0;">
      ${lineup.date} · vs. ${sched.opponent || "TBD"} · ${sched.location || ""} · ${fmtTime(sched.time)}
    </div>`;

    if (lineups.length > 1) {
      html += `<select id="lineup-picker" style="margin-bottom:14px;padding:6px;">
        ${lineups.map(l => `<option value="${l.date}" ${l.date === lineup.date ? "selected" : ""}>${l.date} — Game ${l.game}</option>`).join("")}
      </select>`;
    }

    html += `<div class="card"><h3>Batting Order</h3>`;
    const order = lineup.batting_order || [];
    if (order.length === 0) {
      html += `<p class="label" style="margin:0;">Batting order not recorded.</p>`;
    } else {
      order.forEach(b => {
        html += `<div class="row">
          <span><strong>${b.order}.</strong> <strong>${b.nickname}</strong> #${jerseyByNick[b.nickname] || "?"}
            <span class="label">(${nameByNick[b.nickname] || ""})</span>
            ${b.eh_only ? `<span class="badge" style="background:#eee;color:var(--navy);">EH</span>` : ""}
          </span>
        </div>`;
      });
      if (order.some(b => b.eh_only)) {
        html += `<div class="label" style="margin-top:10px;font-style:italic;">* EH = Extra Hitter (bats only, does not field)</div>`;
      }
    }
    html += `</div>`;

    html += `<div class="card"><h3>Defense (4-OF)</h3>${diamondSvg(lineup.defense || {})}</div>`;

    el.innerHTML = html;
    const picker = document.getElementById("lineup-picker");
    if (picker) picker.addEventListener("change", (e) => {
      const next = lineups.find(l => l.date === e.target.value);
      if (next) render(next);
    });
  }
  render(selected);
}

function diamondSvg(defense) {
  // viewBox 400x400. Home plate corner at (200, 360). Foul lines extend 45° up-outward
  // to foul poles at (40, 200) and (360, 200). Fence is a semicircle behind the
  // outfielders, from foul pole to foul pole, centered at (200, 200), radius 160.
  const pos = {
    "P":   [200, 285],
    "C":   [200, 375],
    "1B":  [270, 250],
    "2B":  [240, 195],
    "SS":  [160, 195],
    "3B":  [130, 250],
    "LF":  [100, 130],
    "LCF": [155, 80],
    "RCF": [245, 80],
    "RF":  [300, 130],
  };
  // Fence: polyline approximation of a semicircle bulging upward away from home
  const fencePts = [];
  for (let i = 0; i <= 60; i++) {
    const t = Math.PI + Math.PI * (i / 60);    // pi -> 2*pi
    const x = 200 + 160 * Math.cos(t);
    const y = 200 + 160 * Math.sin(t);          // sin negative in (pi, 2pi) -> smaller y -> UP
    fencePts.push(`${x.toFixed(1)},${y.toFixed(1)}`);
  }
  const labels = Object.entries(pos).map(([p, [x, y]]) => `
    <g>
      <rect x="${x - 32}" y="${y - 11}" width="64" height="22" fill="white" stroke="black" stroke-width="1" rx="4"/>
      <text x="${x}" y="${y + 4}" text-anchor="middle" font-size="11" font-weight="700">${defense[p] || "?"}</text>
      <text x="${x}" y="${y + 22}" text-anchor="middle" font-size="9" fill="#666">${p}</text>
    </g>`).join("");
  return `<svg class="diamond" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
    <!-- fence (semicircle behind outfielders) -->
    <polyline points="${fencePts.join(" ")}" stroke="black" fill="none" stroke-width="1.5"/>
    <!-- foul lines: home plate (200,360) to foul poles (40,200) and (360,200) -->
    <line x1="200" y1="360" x2="40" y2="200" stroke="black" stroke-width="1"/>
    <line x1="200" y1="360" x2="360" y2="200" stroke="black" stroke-width="1"/>
    <!-- infield diamond: home, 1B, 2B, 3B -->
    <polygon points="200,360 275,285 200,210 125,285" fill="none" stroke="black" stroke-width="1.5"/>
    <!-- pitcher's mound -->
    <circle cx="200" cy="285" r="8" fill="none" stroke="black"/>
    ${labels}
  </svg>`;
}
function renderRoster() {
  const el = document.getElementById("roster");
  const main = DATA.roster.filter(p => p.type === "main");
  const extras = DATA.roster.filter(p => p.type === "extra");
  let html = `<h2 style="margin-top:0;">Roster</h2><div class="grid">`;
  main.forEach(p => {
    html += rosterCard(p);
  });
  html += `</div>`;
  if (extras.length) {
    html += `<h3 style="margin-top:24px;color:var(--muted);font-size:14px;">EXTRAS</h3><div class="grid">`;
    extras.forEach(p => html += rosterCard(p));
    html += `</div>`;
  }
  el.innerHTML = html;
}

function rosterCard(p) {
  const stats = (DATA.stats_summary || {})[p.nickname];
  const statLine = stats ? `${stats.AVG.toFixed(3)} / ${stats.OPS.toFixed(3)}` : "";
  const fun = (DATA.fun_stats || {})[p.nickname];
  const funLines = fun ? Object.entries(fun).map(([label, v]) => `${label}: ${v}`).join(", ") : "";
  return `<div class="roster-card">
    <div class="jersey">#${p.jersey}</div>
    <div class="nick">${p.nickname}</div>
    <div class="real">${p.name}</div>
    ${statLine ? `<div class="label" style="margin-top:6px;">AVG / OPS</div><div style="font-size:13px;">${statLine}</div>` : ""}
    ${funLines ? `<div class="label" style="margin-top:6px;">FUN STAT</div><div style="font-size:13px;">${funLines}</div>` : ""}
  </div>`;
}
function renderStats() {
  const el = document.getElementById("stats");
  const rows = Object.entries(DATA.stats_summary || {})
                     .filter(([, s]) => s.PA > 0)
                     .map(([nick, s]) => ({ nick, ...s }));
  if (rows.length === 0) {
    el.innerHTML = `<h2>Stats</h2><p class="label">No stats yet.</p>`;
    return;
  }
  const leaders = (key) => [...rows].sort((a, b) => b[key] - a[key]).slice(0, 3);
  const fmt = (n, d = 3) => Number(n).toFixed(d);

  let html = `<h2 style="margin-top:0;">Stats</h2>`;
  ["AVG", "OBP", "SLG", "OPS"].forEach(key => {
    html += `<div class="card"><h3>Top ${key}</h3>`;
    leaders(key).forEach(r => {
      html += `<div class="row"><span>${r.nick}</span><span>${fmt(r[key])}</span></div>`;
    });
    html += `</div>`;
  });
  ["HR", "RBI"].forEach(key => {
    html += `<div class="card"><h3>${key} Leaders</h3>`;
    leaders(key).forEach(r => {
      html += `<div class="row"><span>${r.nick}</span><span>${r[key]}</span></div>`;
    });
    html += `</div>`;
  });

  // Full sortable table
  const cols = ["nick", "G", "PA", "AB", "H", "HR", "RBI", "R", "BB", "K", "AVG", "OBP", "SLG", "OPS"];
  html += `<div class="card"><h3>Full Table</h3><div style="overflow-x:auto;"><table id="stats-table">
    <thead><tr>${cols.map(c => `<th data-col="${c}">${c === "nick" ? "PLAYER" : c.toUpperCase()}</th>`).join("")}</tr></thead><tbody>
    ${rows.map(r => `<tr>${cols.map(c => {
      const v = r[c];
      const cell = typeof v === "number" && c.match(/AVG|OBP|SLG|OPS/) ? fmt(v) : v;
      return `<td>${cell}</td>`;
    }).join("")}</tr>`).join("")}
    </tbody></table></div></div>`;
  el.innerHTML = html;

  // Sortable columns
  document.querySelectorAll("#stats-table th").forEach(th => {
    th.addEventListener("click", () => {
      const col = th.dataset.col;
      rows.sort((a, b) => {
        if (typeof a[col] === "number") return b[col] - a[col];
        return String(a[col]).localeCompare(String(b[col]));
      });
      renderStats();  // simple rerender
    });
  });
}

load();

// Poll JSONBin every 30s so cross-device updates show up
setInterval(async () => {
  await loadRsvps();
  // only re-render the tabs that show RSVP info
  renderHome();
  renderSchedule();
  if (document.getElementById("rsvp-modal").classList.contains("active")) {
    renderRsvpModal();
  }
}, 30000);
</script>
