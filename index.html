<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Charlotte Softball · IMI 2026</title>
<style>
  :root {
    --bg: #f7f7f4;
    --fg: #111;
    --muted: #666;
    --accent: #111;
    --card: #fff;
    --border: #ddd;
    --good: #1c7c3a;
    --bad: #a82020;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
               font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
               -webkit-font-smoothing: antialiased; }
  header { background: var(--fg); color: #fff; padding: 14px 20px; }
  header h1 { margin: 0; font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
  header .subtitle { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  nav.tabs { display: flex; background: #fff; border-bottom: 1px solid var(--border);
             overflow-x: auto; position: sticky; top: 0; z-index: 10; }
  nav.tabs button { background: transparent; border: 0; padding: 14px 18px;
                    font-size: 14px; font-weight: 600; color: var(--muted);
                    cursor: pointer; border-bottom: 3px solid transparent; }
  nav.tabs button.active { color: var(--fg); border-bottom-color: var(--fg); }
  main { max-width: 720px; margin: 0 auto; padding: 16px; }
  .panel { display: none; }
  .panel.active { display: block; }
  .card { background: var(--card); border: 1px solid var(--border);
          border-radius: 8px; padding: 14px; margin-bottom: 12px; }
  .card h3 { margin: 0 0 6px 0; font-size: 14px; color: var(--muted);
             text-transform: uppercase; letter-spacing: 0.5px; }
  .card .big { font-size: 32px; font-weight: 700; }
  .label { font-size: 12px; color: var(--muted); text-transform: uppercase;
           letter-spacing: 0.5px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px;
           font-size: 12px; font-weight: 700; }
  .badge.win { background: #e6f3ea; color: var(--good); }
  .badge.loss { background: #fbe6e6; color: var(--bad); }
  .row { display: flex; justify-content: space-between; align-items: center;
         padding: 10px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: 0; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
          gap: 10px; }
  .roster-card { background: #fff; border: 1px solid var(--border);
                 border-radius: 8px; padding: 10px; text-align: center; }
  .roster-card .jersey { font-size: 28px; font-weight: 800; }
  .roster-card .nick { font-weight: 700; margin-top: 4px; }
  .roster-card .real { font-size: 12px; color: var(--muted); }
  button.primary { background: var(--fg); color: #fff; border: 0;
                   padding: 10px 16px; border-radius: 6px; font-weight: 600;
                   cursor: pointer; }
  button.secondary { background: #fff; color: var(--fg); border: 1px solid var(--fg);
                     padding: 10px 16px; border-radius: 6px; font-weight: 600;
                     cursor: pointer; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; background: #fff;
          border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  th, td { text-align: right; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  th:first-child, td:first-child { text-align: left; }
  th { background: #f0f0ed; cursor: pointer; user-select: none; }
  /* Modal */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
              z-index: 100; align-items: center; justify-content: center; padding: 16px; }
  .modal-bg.active { display: flex; }
  .modal { background: #fff; border-radius: 12px; padding: 20px; max-width: 500px;
           width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal h2 { margin: 0 0 4px 0; font-size: 18px; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
           background: var(--fg); color: #fff; padding: 10px 16px; border-radius: 6px;
           opacity: 0; transition: opacity 0.2s; z-index: 200; pointer-events: none; }
  .toast.show { opacity: 1; }
  /* Diamond */
  svg.diamond { width: 100%; height: auto; max-height: 480px; }
</style>
</head>
<body>

<header>
  <h1>Charlotte Softball</h1>
  <div class="subtitle">IMI 2026 Season</div>
</header>

<nav class="tabs" id="tabs">
  <button data-tab="home" class="active">Home</button>
  <button data-tab="schedule">Schedule</button>
  <button data-tab="lineup">Lineup</button>
  <button data-tab="roster">Roster</button>
  <button data-tab="stats">Stats</button>
</nav>

<main>
  <section id="home" class="panel active"></section>
  <section id="schedule" class="panel"></section>
  <section id="lineup" class="panel"></section>
  <section id="roster" class="panel"></section>
  <section id="stats" class="panel"></section>
</main>

<div class="modal-bg" id="rsvp-modal">
  <div class="modal" id="rsvp-modal-content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// Global state
let DATA = null;
let KEYS = null;
let RSVPS = {};  // { "YYYY-MM-DD": { nick: { status, ts } } }

// --- Tab switching ---
document.getElementById("tabs").addEventListener("click", (e) => {
  if (e.target.tagName !== "BUTTON") return;
  const tab = e.target.dataset.tab;
  document.querySelectorAll("nav.tabs button").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  document.querySelectorAll(".panel").forEach(p => p.classList.toggle("active", p.id === tab));
});

// --- Toast helper ---
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2200);
}

// --- Bootstrap ---
async function load() {
  DATA = await fetch("data.json").then(r => r.json());
  KEYS = await fetch("keys.json").then(r => r.json());
  await loadRsvps();
  renderHome();
  renderSchedule();
  renderLineup();
  renderRoster();
  renderStats();
}

async function loadRsvps() {
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${KEYS.binId}/latest`, {
      headers: { "X-Master-Key": KEYS.readKey }
    });
    const json = await res.json();
    RSVPS = json.record || {};
  } catch (e) {
    console.error("Could not load RSVPs:", e);
    RSVPS = {};
  }
}

// --- Render stubs (each tab task fills these in) ---
function renderHome() {
  const home = document.getElementById("home");
  const { season, schedule, stats_summary } = DATA;
  const played = schedule.filter(g => g.status === "played");
  const upcoming = schedule.filter(g => g.status === "upcoming")
                            .sort((a, b) => a.date.localeCompare(b.date));
  const lastGame = played[played.length - 1];
  const nextGame = upcoming[0];
  const recordStr = `${season.record.W}–${season.record.L}`;

  // Top stat leaders
  const players = Object.entries(stats_summary || {});
  const sortedByAVG = [...players].filter(([, s]) => s.AB >= 1)
                                   .sort((a, b) => b[1].AVG - a[1].AVG).slice(0, 3);
  const sortedByOPS = [...players].filter(([, s]) => s.AB >= 1)
                                   .sort((a, b) => b[1].OPS - a[1].OPS).slice(0, 3);

  let html = "";
  html += `<div class="card"><h3>Season Record</h3><div class="big">${recordStr}</div></div>`;

  if (nextGame) {
    const rsvps = RSVPS[nextGame.date] || {};
    const inCount = Object.values(rsvps).filter(r => r.status === "IN").length;
    const outCount = Object.values(rsvps).filter(r => r.status === "OUT").length;
    const unconfirmed = DATA.roster.length - inCount - outCount;
    html += `<div class="card">
      <h3>Next Game</h3>
      <div><strong>${nextGame.date}</strong> · vs. ${nextGame.opponent || "TBD"}</div>
      <div class="label" style="margin-top:6px;">${nextGame.location || ""} · ${nextGame.time || ""}</div>
      <div style="margin-top:10px;">
        <span class="label">RSVPs:</span>
        ${inCount} IN · ${outCount} OUT · ${unconfirmed} ?
      </div>
    </div>`;
  }

  if (lastGame) {
    const r = lastGame.result || {};
    const badgeCls = r.outcome === "W" ? "win" : "loss";
    html += `<div class="card">
      <h3>Last Game</h3>
      <div><strong>${lastGame.date}</strong> vs. ${lastGame.opponent || "TBD"}</div>
      <div style="margin-top:6px;">${r.score || "?"} <span class="badge ${badgeCls}">${r.outcome || "?"}</span></div>
    </div>`;
  }

  if (sortedByAVG.length) {
    html += `<div class="card"><h3>Top Avg</h3>`;
    sortedByAVG.forEach(([nick, s]) => {
      html += `<div class="row"><span>${nick}</span><span>${s.AVG.toFixed(3)}</span></div>`;
    });
    html += `</div>`;
  }
  if (sortedByOPS.length) {
    html += `<div class="card"><h3>Top OPS</h3>`;
    sortedByOPS.forEach(([nick, s]) => {
      html += `<div class="row"><span>${nick}</span><span>${s.OPS.toFixed(3)}</span></div>`;
    });
    html += `</div>`;
  }

  home.innerHTML = html;
}
function renderSchedule() { document.getElementById("schedule").innerHTML = "<p>Schedule — TBD</p>"; }
function renderLineup() { document.getElementById("lineup").innerHTML = "<p>Lineup — TBD</p>"; }
function renderRoster() { document.getElementById("roster").innerHTML = "<p>Roster — TBD</p>"; }
function renderStats() { document.getElementById("stats").innerHTML = "<p>Stats — TBD</p>"; }

load();
</script>
</body>
</html>
